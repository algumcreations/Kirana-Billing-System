<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gupta Kirana Store | Premium SaaS Billing</title>

    <!-- External Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        :root {
            --brand: #6366f1;
            --brand-soft: #eef2ff;
            --success: #10b981;
            --danger: #f43f5e;
            --warning: #f59e0b;
            --dark: #0f172a;
            --light: #f8fafc;
            --border: #e2e8f0;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
        }

        * { box-sizing: border-box; transition: all 0.2s ease; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--light);
            color: var(--dark);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .app-container {
            width: 100%;
            max-width: 850px;
            background: white;
            border-radius: 24px;
            box-shadow: var(--shadow);
            padding: 40px;
            border: 1px solid var(--border);
        }

        /* Branding */
        .header { text-align: center; margin-bottom: 40px; }
        .header h1 { margin: 0; font-size: 32px; font-weight: 800; color: var(--brand); letter-spacing: -0.5px; }
        .header p { margin: 8px 0 0; color: #64748b; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }

        /* Icon Wrapper */
        .icon-svg { width: 20px; height: 20px; fill: currentColor; }

        /* Form Controls */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .input-group { display: flex; flex-direction: column; gap: 8px; }
        label { font-size: 13px; font-weight: 600; color: #475569; }
        input, select {
            padding: 14px;
            border-radius: 12px;
            border: 1.5px solid var(--border);
            font-size: 16px;
            outline: none;
            background: #fff;
        }
        input:focus { border-color: var(--brand); box-shadow: 0 0 0 4px var(--brand-soft); }

        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 14px 24px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            border: none;
            text-decoration: none;
        }
        .btn-brand { background: var(--brand); color: white; }
        .btn-brand:hover { background: #4f46e5; }
        .btn-outline { background: white; border: 1.5px solid var(--border); color: var(--dark); }
        .btn-outline:hover { background: var(--light); border-color: #cbd5e1; }
        .btn-success { background: var(--success); color: white; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-warning { background: var(--warning); color: white; }

        /* Client Card */
        #clientDetails { margin-bottom: 25px; }
        .client-profile {
            background: var(--brand-soft);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid #c7d2fe;
            display: flex;
            align-items: center;
            gap: 20px;
            animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        /* Item Table Management */
        .item-list { margin-top: 30px; }
        .item-row { 
            display: grid; 
            grid-template-columns: 3fr 1fr 50px; 
            gap: 15px; 
            margin-bottom: 12px; 
            align-items: center; 
        }
        .remove-row-btn {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--danger);
            background: #fff1f2;
            border-radius: 10px;
            cursor: pointer;
        }

        /* Totals Display */
        .total-summary {
            text-align: right;
            margin: 30px 0;
            padding: 20px;
            background: var(--light);
            border-radius: 16px;
        }
        .total-summary h2 { margin: 0; color: var(--brand); font-size: 28px; font-weight: 800; }

        /* Invoice Preview Styling */
        .invoice-preview {
            background: white;
            border: 1px solid var(--border);
            padding: 40px;
            border-radius: 20px;
            margin-top: 40px;
            position: relative;
            display: none;
        }
        .invoice-table { width: 100%; border-collapse: collapse; margin: 30px 0; }
        .invoice-table th { text-align: left; padding: 12px; border-bottom: 2px solid var(--border); font-size: 13px; color: #64748b; }
        .invoice-table td { padding: 12px; border-bottom: 1px solid var(--border); font-size: 15px; }
        
        .badge {
            position: absolute; top: 30px; right: 30px;
            padding: 6px 16px; border-radius: 20px; font-size: 12px; font-weight: 700;
        }
        .badge-paid { background: #dcfce7; color: #15803d; }
        .badge-due { background: #fee2e2; color: #b91c1c; }
        .badge-partial { background: #fef3c7; color: #b45309; }

        .qr-area { text-align: center; margin-top: 30px; padding-top: 30px; border-top: 1px dashed var(--border); }
        .qr-area canvas { margin: 15px auto; }

        /* Utility */
        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }

        @media (max-width: 600px) {
            .app-container { padding: 20px; border-radius: 0; }
            .grid { grid-template-columns: 1fr; }
            .item-row { grid-template-columns: 1fr; gap: 10px; border: 1px solid var(--border); padding: 15px; border-radius: 12px; }
            .action-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h1>Gupta Kirana Store</h1>
        <p>Managed By Rohit Gupta | SaaS v2.0</p>
    </div>

    <!-- Client Lookup -->
    <div class="grid">
        <div class="input-group">
            <label>Mobile Number</label>
            <input type="tel" id="mobile" value="+91" placeholder="91XXXXXXXXXX">
        </div>
        <div style="display: flex; align-items: flex-end;">
            <button class="btn btn-outline" onclick="fetchClient()" style="width: 100%;" id="fetchBtn">
                <svg class="icon-svg" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/></svg>
                Fetch History
            </button>
        </div>
    </div>

    <div id="clientDetails"></div>

    <div class="input-group">
        <label>Client Name</label>
        <input type="text" id="customer" placeholder="Customer Ka Naam">
    </div>

    <!-- Item Management -->
    <div class="item-list">
        <label style="margin-bottom: 15px; display: block;">Billing Items</label>
        <div id="itemsContainer"></div>
        <button class="btn btn-outline" onclick="addItemRow()" style="width: 100%; margin-top: 10px; border-style: dashed;">
            <svg class="icon-svg" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/></svg>
            Add New Item
        </button>
    </div>

    <div class="total-summary">
        <p style="font-size: 14px; color: #64748b; margin: 0;">Net Payable</p>
        <h2 id="grandTotalText">₹0.00</h2>
    </div>

    <!-- Payment & Discount -->
    <div class="grid">
        <div class="input-group">
            <label>Discount Amount (₹)</label>
            <input type="number" id="discount" value="0" oninput="updateCalculations()">
        </div>
        <div class="input-group">
            <label>Paid Amount (₹)</label>
            <input type="number" id="paidAmount" value="0">
        </div>
    </div>

    <div class="grid">
        <div class="input-group">
            <label>Payment Mode</label>
            <select id="paymentMode">
                <option value="Online">Online / UPI</option>
                <option value="Cash">Cash / Offline</option>
            </select>
        </div>
        <div style="display: flex; align-items: flex-end;">
            <button class="btn btn-brand" onclick="generateInvoice()" style="width: 100%;">
                <svg class="icon-svg" viewBox="0 0 24 24"><path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/></svg>
                Create Final Invoice
            </button>
        </div>
    </div>

    <!-- Advance QR Section -->
    <div style="margin-top: 30px; background: #f1f5f9; padding: 20px; border-radius: 16px;">
        <label>Quick Payment QR</label>
        <div style="display: flex; gap: 10px; margin-top: 10px;">
            <input type="number" id="quickPayAmount" placeholder="Enter Amount" style="flex: 1; margin-bottom: 0;">
            <button class="btn btn-warning" onclick="generateQuickQR('advance')">Pay Due</button>
            <button class="btn btn-success" onclick="generateQuickQR('full')">Pay Full</button>
        </div>
        <div id="quickQRContainer" style="text-align:center;"></div>
    </div>

    <!-- Invoice Preview Area -->
    <div id="invoiceArea" class="invoice-preview">
        <!-- Content injected by JS -->
    </div>

    <!-- Action Buttons -->
    <div id="afterButtons" class="action-grid" style="display: none;">
        <button class="btn btn-brand" onclick="downloadInvoice()">
            <svg class="icon-svg" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
            Download PNG
        </button>
        <button class="btn btn-success" onclick="shareWhatsApp()">
            <svg class="icon-svg" viewBox="0 0 24 24" fill="white"><path d="M12.012 2c-5.508 0-9.988 4.48-9.988 9.988 0 1.76.46 3.412 1.26 4.848L2 22l5.304-1.392c1.4.764 3.004 1.2 4.708 1.2 5.508 0 9.988-4.48 9.988-9.988 0-5.508-4.48-9.988-9.988-9.988zM17.42 15.652c-.228.652-1.336 1.192-1.844 1.26-.464.06-1.06.084-1.708-.124-2.508-.8-4.144-3.344-4.268-3.512-.124-.168-1.012-1.348-1.012-2.572 0-1.224.636-1.828.864-2.072.228-.244.492-.304.656-.304.168 0 .336 0 .484.008.156.008.364-.06.572.444.208.504.716 1.748.776 1.868.06.12.1.264.02.428-.08.164-.12.264-.24.404-.12.14-.256.312-.364.42-.12.12-.244.252-.104.492.14.24.62 1.024 1.332 1.66.916.82 1.688 1.076 1.928 1.196.24.12.38.1.52-.06.14-.16.6-1.032.76-1.388.16-.356.32-.296.544-.212.224.084 1.424.672 1.668.796s.404.184.464.284c.06.1.06.58-.168 1.232z"/></svg>
            WhatsApp Bill
        </button>
        <button class="btn btn-outline" style="grid-column: span 2;" onclick="window.print()">
            Print Receipt
        </button>
    </div>
</div>

<script>
    const UPI_ID = "tinu01jmp@okhdfcbank";
    const SHEET_API = "https://script.google.com/macros/s/AKfycbz7L7LsHuTui703d62Yt4PO4Wtw69a4ALM-eVJqJmalwYcygLgq6EPPS8kuwRQNh28dcQ/exec";

    // Standard Items Inventory
    const services = [
        {name:"Rice (Basmati) 1kg",price:120}, {name:"Rice (Regular) 1kg",price:55},
        {name:"Wheat Flour (Atta) 1kg",price:45}, {name:"Maida 1kg",price:50},
        {name:"Suji / Rava 1kg",price:45}, {name:"Besan 1kg",price:80},
        {name:"Toor Dal 1kg",price:140}, {name:"Moong Dal 1kg",price:130},
        {name:"Masoor Dal 1kg",price:110}, {name:"Chana Dal 1kg",price:95},
        {name:"Urad Dal 1kg",price:140}, {name:"Rajma 1kg",price:120},
        {name:"Sugar 1kg",price:45}, {name:"Salt 1kg",price:20},
        {name:"Mustard Oil 1L",price:170}, {name:"Refined Oil 1L",price:150},
        {name:"Ghee 1L",price:600}, {name:"Tea 250g",price:140},
        {name:"Coffee 100g",price:120}, {name:"Poha 1kg",price:50},
        {name:"Soap (Bath)",price:35}, {name:"Detergent 1kg",price:110},
        {name:"Toothpaste 100g",price:55}, {name:"Biscuits",price:10},
        {name:"Bread",price:40}, {name:"Matches (Pack)",price:15}
    ];

    // --- Core Database Function ---
    async function fetchClient() {
        const phoneRaw = document.getElementById("mobile").value.replace(/\D/g, "");
        const phone = phoneRaw.length === 10 ? "91" + phoneRaw : phoneRaw;
        if (phone.length < 10) { alert("Sahi mobile number darj karein."); return; }

        const btn = document.getElementById("fetchBtn");
        btn.disabled = true;
        btn.innerHTML = "Processing...";

        try {
            const res = await fetch(SHEET_API, {
                method: 'POST',
                body: JSON.stringify({ action: "getClient", phone: phone })
            });
            const data = await res.json();
            
            const detailDiv = document.getElementById("clientDetails");
            if (data.found) {
                detailDiv.innerHTML = `
                <div class="client-profile">
                    <div style="background: var(--brand); color: white; padding: 12px; border-radius: 50%;">
                        <svg class="icon-svg" viewBox="0 0 24 24"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" stroke="currentColor" stroke-width="2" fill="none"/></svg>
                    </div>
                    <div>
                        <p style="margin:0; font-weight:700; color:var(--brand); font-size:16px;">Old Customer: ${data.name}</p>
                        <p style="margin:2px 0; font-size:13px; color:#475569;">Total Purchased: ₹${data.totalBill} | Balance Due: <span style="color:red; font-weight:bold;">₹${data.totalDue}</span></p>
                    </div>
                </div>`;
                document.getElementById("customer").value = data.name;
            } else {
                detailDiv.innerHTML = `<div class="client-profile" style="background:#f1f5f9; border-color:#e2e8f0;"><p style="margin:0; font-size:14px; color:#64748b;">Naya Grahak (New Customer) Detected.</p></div>`;
            }
        } catch (e) {
            alert("Sheet Connection Error. Local mode active.");
        } finally {
            btn.disabled = false;
            btn.innerHTML = "Fetch History";
        }
    }

    // --- Item Management ---
    function addItemRow() {
        const container = document.getElementById("itemsContainer");
        const div = document.createElement("div");
        div.className = "item-row";
        const options = services.map((s, i) => `<option value="${i}">${s.name} - ₹${s.price}</option>`).join("");
        
        div.innerHTML = `
            <select class="sel-item" onchange="updateCalculations()">${options}</select>
            <input type="number" class="sel-qty" value="1" min="1" oninput="updateCalculations()">
            <div class="remove-row-btn" onclick="this.parentElement.remove(); updateCalculations();">
                <svg class="icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </div>
        `;
        container.appendChild(div);
        updateCalculations();
    }

    function updateCalculations() {
        let subtotal = 0;
        document.querySelectorAll(".item-row").forEach(row => {
            const idx = row.querySelector(".sel-item").value;
            const qty = parseFloat(row.querySelector(".sel-qty").value) || 0;
            subtotal += services[idx].price * qty;
        });

        const disc = parseFloat(document.getElementById("discount").value) || 0;
        const final = Math.max(0, subtotal - disc);
        
        document.getElementById("grandTotalText").innerText = `₹${final.toFixed(2)}`;
        document.getElementById("paidAmount").value = final.toFixed(2);
        return final;
    }

    // --- QR Generation ---
    function generateQuickQR(type) {
        const total = updateCalculations();
        const amt = type === 'full' ? total : (parseFloat(document.getElementById("quickPayAmount").value) || 0);
        
        if (amt <= 0) { alert("Rashi darj karein."); return; }
        
        document.getElementById("paidAmount").value = amt.toFixed(2);
        const upi = `upi://pay?pa=${UPI_ID}&pn=GuptaKirana&am=${amt.toFixed(2)}&cu=INR`;
        
        const container = document.getElementById("quickQRContainer");
        container.innerHTML = `<p style="margin-top:15px; font-weight:bold;">Scan To Pay: ₹${amt.toFixed(2)}</p><div id="qQR"></div>`;
        new QRCode(document.getElementById("qQR"), { text: upi, width: 160, height: 160 });
    }

    // --- Final Invoice Rendering ---
    async function generateInvoice() {
        const client = document.getElementById("customer").value || "Grahak";
        const phone = document.getElementById("mobile").value;
        const discount = parseFloat(document.getElementById("discount").value) || 0;
        const paid = parseFloat(document.getElementById("paidAmount").value) || 0;
        const mode = document.getElementById("paymentMode").value;

        let sub = 0;
        let rowsHtml = "";
        document.querySelectorAll(".item-row").forEach(row => {
            const item = services[row.querySelector(".sel-item").value];
            const qty = parseFloat(row.querySelector(".sel-qty").value) || 0;
            const line = item.price * qty;
            sub += line;
            rowsHtml += `<tr><td>${item.name}</td><td>${qty}</td><td>₹${item.price}</td><td>₹${line.toFixed(2)}</td></tr>`;
        });

        const total = sub - discount;
        const bal = total - paid;
        const status = bal <= 0 ? "PAID" : paid > 0 ? "PARTIAL" : "DUE";
        const invNo = "GKS-" + Date.now().toString().slice(-6);

        const area = document.getElementById("invoiceArea");
        area.style.display = "block";
        area.innerHTML = `
            <div id="captureBlock" style="padding:10px; background:white;">
                <div class="badge badge-${status.toLowerCase()}">${status}</div>
                <div style="text-align:center;">
                    <h2 style="margin:0; color:var(--brand); font-size:24px;">GUPTA KIRANA STORE</h2>
                    <p style="font-size:11px; color:#64748b; margin:5px 0;">Digital Billing Solution | Jamalpur, Bihar</p>
                </div>
                <hr style="border:0; border-top:1px solid var(--border); margin:20px 0;">
                <div style="display:flex; justify-content:space-between; font-size:12px;">
                    <div><strong>Bill To:</strong> ${client}<br><strong>Ph:</strong> ${phone}</div>
                    <div style="text-align:right;"><strong>Inv #:</strong> ${invNo}<br><strong>Date:</strong> ${new Date().toLocaleDateString()}</div>
                </div>
                <table class="invoice-table">
                    <thead><tr><th>Item</th><th>Qty</th><th>Rate</th><th>Total</th></tr></thead>
                    <tbody>${rowsHtml}</tbody>
                </table>
                <div style="text-align:right; font-size:14px; line-height:1.8;">
                    Subtotal: ₹${sub.toFixed(2)}<br>
                    Discount: -₹${discount.toFixed(2)}<br>
                    <strong style="font-size:18px; color:var(--brand);">Grand Total: ₹${total.toFixed(2)}</strong><br>
                    Paid (${mode}): ₹${paid.toFixed(2)}<br>
                    <span style="color:red; font-weight:bold;">Remaining: ₹${bal.toFixed(2)}</span>
                </div>
                ${bal > 0 ? `<div class="qr-area"><p style="font-size:12px; margin:0;">Scan to pay balance</p><div id="finalQR"></div></div>` : ""}
            </div>
        `;

        document.getElementById("afterButtons").style.display = "grid";
        if (bal > 0) {
            const upi = `upi://pay?pa=${UPI_ID}&pn=GuptaKirana&am=${bal.toFixed(2)}&cu=INR`;
            new QRCode(document.getElementById("finalQR"), { text: upi, width: 120, height: 120 });
        }

        // Sync with Sheets
        try {
            fetch(SHEET_API, {
                method: 'POST',
                body: JSON.stringify({
                    action: "addBill",
                    phone: phone.replace(/\D/g, ""),
                    name: client,
                    amount: total
                })
            });
        } catch(e) {}
    }

    // --- Final Actions ---
    function downloadInvoice() {
        const target = document.getElementById("captureBlock");
        html2canvas(target, { scale: 3 }).then(canvas => {
            const a = document.createElement("a");
            a.download = `GuptaKirana_Bill_${Date.now()}.png`;
            a.href = canvas.toDataURL("image/png");
            a.click();
        });
    }

    function shareWhatsApp() {
        const name = document.getElementById("customer").value || "Grahak";
        const total = updateCalculations();
        const mobile = document.getElementById("mobile").value.replace(/\D/g, "");
        const text = `Namaste ${name}, Gupta Kirana Store se aapka ₹${total.toFixed(2)} ka bill taiyar hai. Dhananyawad!`;
        window.open(`https://wa.me/${mobile}?text=${encodeURIComponent(text)}`);
    }

    // Init with one row
    addItemRow();
</script>

</body>
</html>
