<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>GKS Enterprise | Professional Billing 2026</title>

    <!-- External Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');

        :root {
            --brand: #6366f1;
            --brand-soft: #eef2ff;
            --success: #10b981;
            --danger: #f43f5e;
            --warning: #f59e0b;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #0f172a;
            --text-soft: #64748b;
            --border: #e2e8f0;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
        }

        [data-theme="dark"] {
            --bg: #020617;
            --card: #0f172a;
            --text: #f8fafc;
            --text-soft: #94a3b8;
            --border: #1e293b;
            --brand-soft: rgba(99, 102, 241, 0.1);
        }

        * { box-sizing: border-box; transition: all 0.2s ease; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { background-color: var(--bg); color: var(--text); margin: 0; padding: 15px; display: flex; justify-content: center; min-height: 100vh; }

        .app-container {
            width: 100%; max-width: 850px; background: var(--card); border-radius: 24px;
            box-shadow: var(--shadow); padding: 25px; border: 1px solid var(--border);
            position: relative;
        }

        /* Header section */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .header h1 { margin: 0; font-size: 26px; font-weight: 800; color: var(--brand); letter-spacing: -0.5px; }
        .header p { margin: 2px 0 0; color: var(--text-soft); font-size: 11px; text-transform: uppercase; font-weight: 700; }

        .theme-btn { 
            background: var(--brand-soft); border: none; width: 42px; height: 42px; 
            border-radius: 12px; cursor: pointer; color: var(--brand); font-size: 18px;
        }

        /* Form styling */
        .section-label { font-size: 11px; font-weight: 800; color: var(--brand); text-transform: uppercase; margin: 20px 0 10px; display: block; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        .input-group { display: flex; flex-direction: column; gap: 6px; }
        label { font-size: 11px; font-weight: 700; color: var(--text-soft); text-transform: uppercase; }
        
        input, select {
            padding: 12px; border-radius: 12px; border: 1.5px solid var(--border);
            font-size: 16px; outline: none; background: var(--card); color: var(--text); width: 100%;
        }
        input:focus { border-color: var(--brand); box-shadow: 0 0 0 4px var(--brand-soft); }

        /* Custom Mobile Input with Prefix */
        .mobile-input-wrapper {
            display: flex; align-items: center; border: 1.5px solid var(--border); border-radius: 12px; background: var(--card); overflow: hidden;
        }
        .mobile-prefix {
            background: var(--brand-soft); color: var(--brand); font-weight: 800; padding: 12px; border-right: 1.5px solid var(--border);
        }
        .mobile-input-wrapper input { border: none; border-radius: 0; }

        /* Sync button */
        .btn-sync { background: var(--brand); color: white; border: none; padding: 12px; border-radius: 12px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; height: 48px; width: 100%; }
        .btn-sync:disabled { opacity: 0.6; }

        /* Cart/Items styling */
        .item-list { margin-top: 15px; border-top: 1px dashed var(--border); padding-top: 15px; }
        .item-row { display: grid; grid-template-columns: 2.5fr 0.8fr 0.8fr 42px; gap: 10px; margin-bottom: 12px; align-items: center; }
        .btn-remove { background: #fee2e2; color: var(--danger); border: none; height: 42px; border-radius: 10px; cursor: pointer; font-weight: 800; font-size: 18px; }

        /* Price Breakdown Panel */
        .breakdown-card {
            background: var(--brand-soft); border-radius: 20px; padding: 20px; 
            margin: 25px 0; border: 1px solid var(--brand);
        }
        .breakdown-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 14px; }
        .total-row { border-top: 1px solid var(--brand); margin-top: 10px; padding-top: 10px; font-weight: 800; font-size: 24px; color: var(--brand); }

        /* Quick Pay Section - BIG INPUT */
        .quick-pay-section {
            background: var(--bg); border: 2px dashed var(--brand);
            padding: 20px; border-radius: 18px; margin: 25px 0;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.02);
        }
        #quickPayAmount {
            font-size: 28px; font-weight: 800; text-align: center; 
            color: var(--brand); border: 2px solid var(--brand);
            height: 70px; margin-bottom: 15px;
        }

        /* Invoice Preview */
        .invoice-outer { margin-top: 30px; display: none; overflow-x: auto; }
        .invoice-card {
            width: 750px; margin: 0 auto; background: white; padding: 45px;
            color: #000; position: relative; border: 1px solid #ddd;
        }
        .inv-badge { position: absolute; top: 40px; right: 45px; background: #000; color: #fff; padding: 4px 12px; font-size: 10px; font-weight: 900; }
        .inv-table { width: 100%; border-collapse: collapse; margin: 20px 0; }
        .inv-table th { border-bottom: 2px solid #000; text-align: left; padding: 10px; font-size: 12px; }
        .inv-table td { padding: 10px; border-bottom: 1px solid #eee; font-size: 13px; }

        /* Action Buttons */
        .btn-action { padding: 15px; border-radius: 14px; border: none; font-weight: 800; font-size: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-main { background: var(--brand); color: white; width: 100%; margin-top: 10px; }
        .btn-success { background: var(--success); color: white; }
        .btn-outline { background: var(--card); border: 1.5px solid var(--border); color: var(--text); }

        #toast {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: #000; color: #fff; padding: 10px 20px; border-radius: 30px;
            font-size: 13px; display: none; z-index: 9999;
        }

        @media (max-width: 600px) {
            .grid { grid-template-columns: 1fr; }
            .item-row { grid-template-columns: 1fr 1.5fr 42px; gap: 8px; }
            .item-row input:first-child { grid-column: span 3; }
        }
    </style>
</head>
<body data-theme="light">

<div id="toast"></div>

<div class="app-container">
    <div class="header">
        <div>
            <h1>Gupta Kirana Store</h1>
            <p>Digital Billing SaaS 2026</p>
        </div>
        <button class="theme-btn" onclick="toggleTheme()">🌓</button>
    </div>

    <!-- Step 1: Client Sync -->
    <span class="section-label">Customer Profile</span>
    <div class="grid">
        <div class="input-group">
            <label>Customer Mobile</label>
            <div class="mobile-input-wrapper">
                <span class="mobile-prefix">+91</span>
                <input type="tel" id="mobile" placeholder="XXXXXXXXXX" maxlength="10">
            </div>
        </div>
        <div style="display: flex; align-items: flex-end;">
            <button class="btn-sync" onclick="fetchClient()" id="fetchBtn">
                Sync Database
            </button>
        </div>
    </div>
    <div id="clientDetails"></div>

    <div class="grid" style="grid-template-columns: 2fr 1fr;">
        <div class="input-group">
            <label>Full Name</label>
            <input type="text" id="customer" placeholder="Enter name">
        </div>
        <div class="input-group">
            <label>Bill Date</label>
            <input type="date" id="billDate">
        </div>
    </div>

    <!-- Step 2: Cart Management -->
    <span class="section-label">Inventory & Cart</span>
    <div class="item-list">
        <div id="itemsContainer"></div>
        <button class="btn-outline" style="width: 100%; border-style: dashed; padding: 12px; margin-top: 10px; border-radius: 12px; cursor: pointer;" onclick="addItemRow()">
            + Add New Item to Cart
        </button>
    </div>

    <!-- Step 3: Precise Breakdown -->
    <div class="breakdown-card">
        <div class="breakdown-row"><span>Subtotal (Net Amount):</span><span id="txtSubtotal">₹0.00</span></div>
        <div class="breakdown-row"><span>Total GST (Tax):</span><span id="txtTax">₹0.00</span></div>
        <div class="breakdown-row"><span>Discount Applied:</span><span id="txtDiscount">-₹0.00</span></div>
        <div class="breakdown-row"><span>Cash Round-off:</span><span id="txtRound">₹0.00</span></div>
        <div class="total-row breakdown-row">
            <span>FINAL TOTAL</span>
            <span id="txtGrandTotal">₹0.00</span>
        </div>
    </div>

    <!-- Step 4: Pay Part / Udhaar Logic (Enhanced Big Input) -->
    <div class="quick-pay-section">
        <label style="color: var(--brand); font-weight: 800; display: block; margin-bottom: 10px;">Quick Pay / Part Amount Entry</label>
        <div style="display: flex; flex-direction: column;">
            <input type="number" id="quickPayAmount" placeholder="Enter Part Amount" oninput="updateCalculations()">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <button class="btn-action btn-success" onclick="generateQuickQR('part')">Pay Part</button>
                <button class="btn-action btn-main" style="margin:0;" onclick="generateQuickQR('full')">Full Pay</button>
            </div>
        </div>
        <div id="quickQRContainer" style="text-align: center; margin-top: 20px;"></div>
    </div>

    <!-- Step 5: Final Finance -->
    <span class="section-label">Payment Authorization</span>
    <div class="grid" style="grid-template-columns: 1fr 1fr 1fr;">
        <div class="input-group">
            <label>Discount (₹)</label>
            <input type="number" id="discount" value="0" oninput="updateCalculations()">
        </div>
        <div class="input-group">
            <label>Paid Amt (₹)</label>
            <input type="number" id="paidAmount" value="0" oninput="updateCalculations()">
        </div>
        <div class="input-group">
            <label>Method</label>
            <select id="paymentMode">
                <option value="Online">UPI / Online</option>
                <option value="Cash">Cash</option>
            </select>
        </div>
    </div>

    <button class="btn-action btn-main" onclick="generateInvoice()">
        Authorize & Generate Final Bill
    </button>

    <!-- Post Generation Buttons -->
    <div id="afterButtons" style="display: none; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px;">
        <button class="btn-action btn-success" onclick="shareWhatsApp()">Share WhatsApp</button>
        <button class="btn-action btn-outline" onclick="downloadInvoice()">Save PNG Image</button>
    </div>

    <!-- Hidden Invoice for Generation -->
    <div id="invoiceArea" class="invoice-outer"></div>

    <datalist id="itemsData"></datalist>
</div>

<script>
    const UPI_ID = "tinu01jmp@okhdfcbank";
    const SHEET_API = "https://script.google.com/macros/s/AKfycbz7L7LsHuTui703d62Yt4PO4Wtw69a4ALM-eVJqJmalwYcygLgq6EPPS8kuwRQNh28dcQ/exec";

    // Detailed inventory with GST percentages
    const inventory = [
        {name:"Rice (Basmati) 1kg", price:120, gst:5}, {name:"Rice (Regular) 1kg", price:55, gst:5},
        {name:"Wheat Flour (Atta) 1kg", price:45, gst:0}, {name:"Maida 1kg", price:50, gst:12},
        {name:"Besan 1kg", price:85, gst:5}, {name:"Sugar 1kg", price:46, gst:12},
        {name:"Salt (Tata) 1kg", price:28, gst:0}, {name:"Mustard Oil 1L", price:175, gst:18},
        {name:"Ghee 1L", price:680, gst:12}, {name:"Toor Dal 1kg", price:145, gst:5},
        {name:"Tea (Tata) 250g", price:140, gst:5}, {name:"Maggi Noodles", price:14, gst:12},
        {name:"Lux Soap 100g", price:35, gst:18}, {name:"Colgate 100g", price:60, gst:18},
        {name:"Surf Excel 500g", price:75, gst:18}, {name:"Parle-G", price:10, gst:12}
    ];

    function showToast(m) {
        const t = document.getElementById('toast');
        t.innerText = m; t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 2500);
    }

    function toggleTheme() {
        const b = document.body;
        const cur = b.getAttribute('data-theme');
        const next = cur === 'light' ? 'dark' : 'light';
        b.setAttribute('data-theme', next);
        localStorage.setItem('gks_theme', next);
    }

    function init() {
        const savedTheme = localStorage.getItem('gks_theme') || 'light';
        document.body.setAttribute('data-theme', savedTheme);
        document.getElementById('billDate').valueAsDate = new Date();
        
        const dl = document.getElementById('itemsData');
        inventory.sort((a,b) => a.name.localeCompare(b.name)).forEach(item => {
            const opt = document.createElement('option');
            opt.value = item.name;
            dl.appendChild(opt);
        });

        if(!loadDraft()) addItemRow();
    }

    function addItemRow(data = {name: "", qty: 1, rate: 0}) {
        const container = document.getElementById('itemsContainer');
        const row = document.createElement('div');
        row.className = 'item-row';
        row.innerHTML = `
            <input type="text" list="itemsData" class="row-name" value="${data.name}" placeholder="Item Name..." oninput="handleAuto(this)">
            <input type="number" class="row-qty" value="${data.qty}" step="0.1" oninput="updateCalculations()">
            <input type="number" class="row-rate" value="${data.rate}" placeholder="Rate" oninput="updateCalculations()">
            <button class="btn-remove" onclick="this.parentElement.remove(); updateCalculations();">×</button>
        `;
        container.appendChild(row);
        updateCalculations();
    }

    function handleAuto(input) {
        const val = input.value;
        const match = inventory.find(i => i.name === val);
        if(match) {
            const row = input.parentElement;
            row.querySelector('.row-rate').value = match.price;
            updateCalculations();
            if (navigator.vibrate) navigator.vibrate(10);
        }
        saveDraft();
    }

    function updateCalculations() {
        let subtotal = 0;
        let totalTax = 0;

        document.querySelectorAll('.item-row').forEach(row => {
            const name = row.querySelector('.row-name').value;
            const qty = parseFloat(row.querySelector('.row-qty').value) || 0;
            const rate = parseFloat(row.querySelector('.row-rate').value) || 0;
            
            const lineAmt = qty * rate;
            subtotal += lineAmt;

            const itemMatch = inventory.find(i => i.name === name);
            if(itemMatch && itemMatch.gst > 0) {
                totalTax += (lineAmt * itemMatch.gst) / 100;
            }
        });

        const discount = parseFloat(document.getElementById('discount').value) || 0;
        const rawNet = subtotal + totalTax - discount;
        const finalNet = Math.round(rawNet);
        const roundOff = (finalNet - rawNet).toFixed(2);

        document.getElementById('txtSubtotal').innerText = `₹${subtotal.toFixed(2)}`;
        document.getElementById('txtTax').innerText = `₹${totalTax.toFixed(2)}`;
        document.getElementById('txtDiscount').innerText = `-₹${discount.toFixed(2)}`;
        document.getElementById('txtRound').innerText = `₹${roundOff}`;
        document.getElementById('txtGrandTotal').innerText = `₹${finalNet.toFixed(2)}`;

        // Special logic: If typing in Quick Pay, sync it to Paid Amount
        if(document.activeElement.id === 'quickPayAmount') {
            document.getElementById('paidAmount').value = document.getElementById('quickPayAmount').value;
        }

        saveDraft();
        return { subtotal, totalTax, discount, finalNet, roundOff };
    }

    function generateQuickQR(type) {
        const calc = updateCalculations();
        let amt = 0;
        if(type === 'full') {
            amt = calc.finalNet;
            document.getElementById('quickPayAmount').value = amt;
        } else {
            amt = parseFloat(document.getElementById('quickPayAmount').value) || 0;
        }

        if(amt < 0) { showToast("Invalid amount"); return; }
        
        // Final sync
        document.getElementById('paidAmount').value = amt;
        
        const upi = `upi://pay?pa=${UPI_ID}&pn=GuptaKirana&am=${amt.toFixed(2)}&cu=INR`;
        const cont = document.getElementById('quickQRContainer');
        cont.innerHTML = `<p style="font-size:12px; font-weight:800; margin-bottom:10px;">Payment QR for ₹${amt}</p><div id="qQR" style="display:inline-block; padding:10px; background:white; border-radius:12px; border:2px solid var(--brand);"></div>`;
        new QRCode(document.getElementById('qQR'), { text: upi, width: 140, height: 140 });
        
        if (navigator.vibrate) navigator.vibrate(50);
        showToast("Paid Amount Updated");
    }

    async function fetchClient() {
        const phone = document.getElementById('mobile').value;
        if(phone.length < 10) { showToast("Enter 10 digit number"); return; }
        const btn = document.getElementById('fetchBtn');
        btn.innerText = "Syncing..."; btn.disabled = true;

        try {
            const res = await fetch(SHEET_API, { method: 'POST', body: JSON.stringify({ action: "getClient", phone }) });
            const data = await res.json();
            const div = document.getElementById('clientDetails');
            
            if(data.found) {
                div.innerHTML = `
                <div style="background:var(--brand-soft); padding:15px; border-radius:14px; border:1px solid var(--brand); margin-bottom:15px;">
                    <div style="font-weight:800; color:var(--brand);">${data.name}</div>
                    <div style="font-size:11px; color:var(--text-soft);">PAST UDHAAR (DUE): <span style="color:var(--danger); font-weight:800;">₹${data.totalDue}</span></div>
                </div>`;
                document.getElementById('customer').value = data.name;
                showToast("History synced!");
            } else {
                div.innerHTML = `<p style="font-size:11px; color:var(--text-soft);">New customer - will be added to database.</p>`;
            }
        } catch(e) { showToast("Sync error"); }
        finally { btn.innerText = "Sync Database"; btn.disabled = false; }
    }

    async function generateInvoice() {
        const calc = updateCalculations();
        const paid = parseFloat(document.getElementById('paidAmount').value) || 0;
        const balance = calc.finalNet - paid;
        const status = balance <= 0 ? "PAID" : "UDHAAR / DUE";
        const invNo = "GKS-" + Date.now().toString().slice(-6);

        let rowsHtml = "";
        document.querySelectorAll('.item-row').forEach(row => {
            const n = row.querySelector('.row-name').value;
            const q = row.querySelector('.row-qty').value;
            const r = row.querySelector('.row-rate').value;
            if(n) rowsHtml += `<tr><td>${n}</td><td>${q}</td><td>${r}</td><td>${(q*r).toFixed(2)}</td></tr>`;
        });

        const area = document.getElementById('invoiceArea');
        area.style.display = 'block';
        area.innerHTML = `
            <div id="captureNode" class="invoice-card">
                <div class="inv-badge">${status}</div>
                <div style="text-align:center; margin-bottom:30px;">
                    <h2 style="margin:0; font-size:26px;">GUPTA KIRANA STORE</h2>
                    <p style="font-size:10px; margin:4px 0;">Jamalpur, Bihar | Digital Tax Receipt</p>
                </div>
                <div style="display:flex; justify-content:space-between; font-size:12px; margin-bottom:20px;">
                    <div><b>Billed To:</b> ${document.getElementById('customer').value}<br><b>Ph:</b> +91 ${document.getElementById('mobile').value}</div>
                    <div style="text-align:right;"><b>Inv:</b> #${invNo}<br><b>Date:</b> ${new Date().toLocaleDateString()}</div>
                </div>
                <table class="inv-table">
                    <thead><tr><th>Description</th><th>Qty</th><th>Rate</th><th>Total</th></tr></thead>
                    <tbody>${rowsHtml}</tbody>
                </table>
                <div style="float:right; width:220px; font-size:12px;">
                    <div style="display:flex; justify-content:space-between;"><span>Subtotal:</span><span>₹${calc.subtotal.toFixed(2)}</span></div>
                    <div style="display:flex; justify-content:space-between;"><span>Tax (GST):</span><span>₹${calc.totalTax.toFixed(2)}</span></div>
                    <div style="display:flex; justify-content:space-between;"><span>Discount:</span><span>-₹${calc.discount.toFixed(2)}</span></div>
                    <div style="display:flex; justify-content:space-between;"><span>Round-off:</span><span>₹${calc.roundOff}</span></div>
                    <div style="display:flex; justify-content:space-between; font-weight:900; font-size:18px; border-top:2px solid #000; margin-top:8px; padding-top:8px;">
                        <span>TOTAL:</span><span>₹${calc.finalNet.toFixed(2)}</span>
                    </div>
                    <div style="display:flex; justify-content:space-between; margin-top:8px;"><span>Paid Amt:</span><span>₹${paid}</span></div>
                    <div style="display:flex; justify-content:space-between; color:red; font-weight:800;"><span>Remaining:</span><span>₹${balance}</span></div>
                </div>
                <div style="clear:both; text-align:center; margin-top:40px; padding-top:20px; border-top:1px solid #eee;">
                    <div id="finalQR" style="display:inline-block;"></div>
                    <p id="qrText" style="font-size:10px; margin-top:10px; font-weight:700;"></p>
                    <p style="font-size:10px; margin-top:5px;">Thank you for shopping! Build by Algum 2026</p>
                </div>
            </div>`;

        if(balance > 0) {
            document.getElementById('qrText').innerText = `Scan to pay Balance: ₹${balance}`;
            new QRCode(document.getElementById('finalQR'), { 
                text: `upi://pay?pa=${UPI_ID}&pn=GuptaKirana&am=${balance.toFixed(2)}&cu=INR`, 
                width: 100, height: 100 
            });
        } else {
            document.getElementById('qrText').innerText = "FULL PAYMENT DONE. THANK YOU!";
            document.getElementById('finalQR').innerHTML = "✅";
            document.getElementById('finalQR').style.fontSize = "40px";
        }

        document.getElementById('afterButtons').style.display = 'grid';
        area.scrollIntoView({ behavior: 'smooth' });
    }

    function shareWhatsApp() {
        const name = document.getElementById('customer').value || "Customer";
        const mobile = document.getElementById('mobile').value;
        const date = document.getElementById('billDate').value;
        const total = document.getElementById('txtGrandTotal').innerText;
        const paid = document.getElementById('paidAmount').value;
        const balance = (parseFloat(total.replace('₹','')) - parseFloat(paid)).toFixed(2);
        
        // Detailed Items Construction
        let itemsList = "";
        document.querySelectorAll('.item-row').forEach((row, index) => {
            const n = row.querySelector('.row-name').value;
            const q = row.querySelector('.row-qty').value;
            const r = row.querySelector('.row-rate').value;
            if(n) {
                itemsList += `${index + 1}. *${n}*\n   ${q} x ₹${r} = *₹${(q*r).toFixed(2)}*\n`;
            }
        });

        let msg = `🏪 *GUPTA KIRANA STORE*\n`;
        msg += `📅 Date: ${new Date(date).toLocaleDateString()}\n`;
        msg += `👤 Customer: *${name}*\n`;
        msg += `--------------------------\n`;
        msg += `📦 *ITEMS PURCHASED:*\n${itemsList}`;
        msg += `--------------------------\n`;
        msg += `💰 Bill Total: *${total}*\n`;
        msg += `✅ Amount Paid: *₹${paid}*\n`;
        
        if(balance > 0) {
            const upiLink = `upi://pay?pa=${UPI_ID}&pn=GuptaKirana&am=${balance}&cu=INR`;
            msg += `🔴 *Balance Due: ₹${balance}*\n\n`;
            msg += `Pay Balance here:\n${upiLink}\n\n`;
        } else {
            msg += `🟢 Status: *FULLY PAID*\n\n`;
        }
        
        msg += `_Thank you for shopping with us!_`;

        // Direct WhatsApp API call with +91 prefix
        window.open(`https://wa.me/91${mobile}?text=${encodeURIComponent(msg)}`);
    }

    function downloadInvoice() {
        const target = document.getElementById("captureNode");
        html2canvas(target, { scale: 3 }).then(canvas => {
            const a = document.createElement("a");
            a.download = `Bill_${document.getElementById('customer').value || 'Customer'}_${Date.now()}.png`;
            a.href = canvas.toDataURL();
            a.click();
        });
    }

    function saveDraft() {
        const items = [];
        document.querySelectorAll('.item-row').forEach(row => {
            items.push({
                name: row.querySelector('.row-name').value,
                qty: row.querySelector('.row-qty').value,
                rate: row.querySelector('.row-rate').value
            });
        });
        const d = { 
            name: document.getElementById('customer').value, 
            mob: document.getElementById('mobile').value, 
            paid: document.getElementById('paidAmount').value,
            items 
        };
        localStorage.setItem('gks_bill_draft', JSON.stringify(d));
    }

    function loadDraft() {
        const saved = localStorage.getItem('gks_bill_draft');
        if(!saved) return false;
        const d = JSON.parse(saved);
        document.getElementById('customer').value = d.name || "";
        document.getElementById('mobile').value = d.mob || "";
        document.getElementById('paidAmount').value = d.paid || 0;
        if(d.items && d.items.length > 0) {
            d.items.forEach(i => addItemRow(i));
            return true;
        }
        return false;
    }

    window.onload = init;
</script>

</body>
</html>
