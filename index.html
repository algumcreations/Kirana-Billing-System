<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- Viewport settings to prevent mobile auto-zoom on input focus -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Algum Creations | Professional Billing SaaS 2026</title>

    <!-- External Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

        :root {
            --brand: #6366f1;
            --brand-soft: #eef2ff;
            --success: #10b981;
            --danger: #f43f5e;
            --warning: #f59e0b;
            --dark: #0f172a;
            --light: #f8fafc;
            --border: #e2e8f0;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
        }

        * { box-sizing: border-box; transition: all 0.2s ease; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body {
            background-color: var(--light);
            color: var(--dark);
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
        }

        .app-container {
            width: 100%;
            max-width: 850px;
            background: white;
            border-radius: 24px;
            box-shadow: var(--shadow);
            padding: 30px;
            border: 1px solid var(--border);
        }

        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { margin: 0; font-size: 28px; font-weight: 800; color: var(--brand); letter-spacing: -0.5px; }
        .header p { margin: 5px 0 0; color: #64748b; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }

        .icon-svg { width: 18px; height: 18px; fill: currentColor; }

        /* Form Controls */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        .input-group { display: flex; flex-direction: column; gap: 6px; }
        label { font-size: 12px; font-weight: 700; color: #475569; text-transform: uppercase; }
        
        /* Font-size 16px prevents mobile browsers from zooming in on focus */
        input, select {
            padding: 12px;
            border-radius: 10px;
            border: 1.5px solid var(--border);
            font-size: 16px; 
            outline: none;
            background: #fff;
            width: 100%;
        }
        input:focus { border-color: var(--brand); box-shadow: 0 0 0 4px var(--brand-soft); }

        /* Buttons */
        .btn {
            display: inline-flex; align-items: center; justify-content: center;
            gap: 8px; padding: 12px 20px; border-radius: 10px;
            font-weight: 700; font-size: 14px; cursor: pointer; border: none;
        }
        .btn-brand { background: var(--brand); color: white; width: 100%; }
        .btn-outline { background: white; border: 1.5px solid var(--border); color: var(--dark); width: 100%; }
        .btn-success { background: var(--success); color: white; }
        .btn-warning { background: var(--warning); color: white; }
        .btn-danger { background: #fee2e2; color: var(--danger); width: 42px; height: 42px; padding: 0; }

        /* Client Card */
        #clientDetails { margin-bottom: 20px; }
        .client-profile {
            background: var(--brand-soft);
            padding: 15px;
            border-radius: 16px;
            border: 1px solid #c7d2fe;
            display: flex;
            align-items: center;
            gap: 15px;
            animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }

        /* Item Management */
        .item-list { margin-top: 25px; border-top: 1px solid var(--border); padding-top: 20px; }
        .item-row { display: grid; grid-template-columns: 3fr 1fr 42px; gap: 10px; margin-bottom: 10px; align-items: center; }

        .total-summary { text-align: right; margin: 20px 0; padding: 15px; background: var(--light); border-radius: 12px; }
        .total-summary h2 { margin: 0; color: var(--brand); font-size: 26px; font-weight: 800; }

        /* Professional Invoice UI */
        .invoice-outer { margin-top: 40px; overflow-x: auto; display: none; padding-bottom: 20px; }
        .invoice-card {
            width: 750px; margin: 0 auto; background: white; padding: 40px;
            border-radius: 20px; border: 1px solid #f1f5f9; position: relative;
        }
        .invoice-header { text-align: center; margin-bottom: 30px; }
        .invoice-header h2 { color: var(--brand); margin: 0; font-size: 26px; text-transform: uppercase; }
        
        .badge { position: absolute; top: 30px; right: 30px; padding: 6px 16px; border-radius: 20px; font-size: 11px; font-weight: 800; color: white; }
        
        .invoice-table { width: 100%; border-collapse: collapse; margin: 25px 0; }
        .invoice-table th { background: var(--brand); color: white; text-align: left; padding: 12px; font-size: 13px; }
        .invoice-table td { padding: 12px; border-bottom: 1px solid #f1f5f9; font-size: 14px; }
        .invoice-table tr:nth-child(even) { background: #f8fafc; }

        .summary-box { background: #f8fafc; border-radius: 16px; padding: 20px; float: right; width: 280px; text-align: right; }
        .summary-row { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 14px; }
        .grand-total { font-size: 18px; font-weight: 800; border-top: 1px solid #e2e8f0; margin-top: 10px; padding-top: 10px; color: var(--dark); }

        .qr-area { text-align: center; margin-top: 30px; padding-top: 20px; border-top: 1px dashed var(--border); clear: both; }

        /* Actions */
        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }

        @media (max-width: 600px) {
            .app-container { padding: 20px; border-radius: 0; }
            .grid { grid-template-columns: 1fr; }
            .item-row { grid-template-columns: 1fr; border: 1px solid var(--border); padding: 12px; border-radius: 15px; }
            .btn-danger { width: 100%; }
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h1>Gupta Kirana Store</h1>
        <p>Premium SaaS Billing Ecosystem 2026</p>
    </div>

    <!-- 1. Client Sync -->
    <div class="grid">
        <div class="input-group">
            <label>Customer Mobile</label>
            <input type="tel" id="mobile" value="+91" placeholder="91XXXXXXXXXX">
        </div>
        <div style="display: flex; align-items: flex-end;">
            <button class="btn btn-outline" onclick="fetchClient()" id="fetchBtn">
                <svg class="icon-svg" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" stroke="currentColor" stroke-width="2.5" fill="none"/></svg>
                Sync Database
            </button>
        </div>
    </div>
    <div id="clientDetails"></div>

    <div class="input-group">
        <label>Customer Name</label>
        <input type="text" id="customer" placeholder="Full Name">
    </div>

    <!-- 2. Inventory Management -->
    <div class="item-list">
        <label style="margin-bottom: 10px; display: block;">Items Inventory</label>
        <div id="itemsContainer"></div>
        <button class="btn btn-outline" onclick="addItemRow()" style="border-style: dashed; margin-top: 10px;">
            <svg class="icon-svg" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4" stroke="currentColor" stroke-width="2.5" fill="none"/></svg>
            Add New Item Row
        </button>
    </div>

    <div class="total-summary">
        <p style="font-size: 11px; color: #64748b; margin: 0; text-transform: uppercase;">Estimated Payable</p>
        <h2 id="grandTotalText">₹0.00</h2>
    </div>

    <!-- 3. Financials -->
    <div class="grid">
        <div class="input-group">
            <label>Discount (₹)</label>
            <input type="number" id="discount" value="0" oninput="updateCalculations(true)">
        </div>
        <div class="input-group">
            <label>Paid Amount (₹)</label>
            <input type="number" id="paidAmount" value="0">
        </div>
    </div>

    <div class="grid">
        <div class="input-group">
            <label>Payment Mode</label>
            <select id="paymentMode">
                <option value="Online">Online / UPI</option>
                <option value="Cash">Cash Liquidity</option>
            </select>
        </div>
        <div style="display: flex; align-items: flex-end;">
            <button class="btn btn-brand" onclick="generateInvoice()">
                <svg class="icon-svg" viewBox="0 0 24 24"><path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" stroke="currentColor" stroke-width="2.5" fill="none"/></svg>
                Authorize & Generate
            </button>
        </div>
    </div>

    <!-- 4. Quick Pay Section -->
    <div style="margin-top: 25px; background: #f1f5f9; padding: 20px; border-radius: 16px;">
        <label>Quick Payment QR Generator</label>
        <div style="display: flex; gap: 8px; margin-top: 8px;">
            <input type="number" id="quickPayAmount" placeholder="Amt" style="flex: 2; margin-bottom: 0;">
            <button class="btn btn-warning" onclick="generateQuickQR('advance')">Pay Part</button>
            <button class="btn btn-success" onclick="generateQuickQR('full')">Pay Full</button>
        </div>
        <div id="quickQRContainer" style="text-align:center; margin-top: 15px;"></div>
    </div>

    <!-- Invoice Preview -->
    <div id="invoiceArea" class="invoice-outer"></div>

    <!-- Final Actions -->
    <div id="afterButtons" class="action-grid" style="display: none;">
        <button class="btn btn-brand" style="background: #0ea5e9;" onclick="downloadInvoice()">
            <svg class="icon-svg" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
            Download PNG
        </button>
        <button class="btn btn-success" onclick="shareWhatsApp()">
            <svg class="icon-svg" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/></svg>
            WhatsApp Bill
        </button>
        <button class="btn btn-outline" style="grid-column: span 2;" onclick="window.print()">Print Receipt</button>
    </div>
</div>

<script>
    const UPI_ID = "tinu01jmp@okhdfcbank";
    const SHEET_API = "https://script.google.com/macros/s/AKfycbz7L7LsHuTui703d62Yt4PO4Wtw69a4ALM-eVJqJmalwYcygLgq6EPPS8kuwRQNh28dcQ/exec";

    const services = [
        {name:"Rice (Basmati) 1kg",price:120}, {name:"Rice (Regular) 1kg",price:55},
        {name:"Wheat Flour (Atta) 1kg",price:45}, {name:"Maida 1kg",price:50},
        {name:"Besan 1kg",price:80}, {name:"Toor Dal 1kg",price:140},
        {name:"Sugar 1kg",price:45}, {name:"Salt 1kg",price:20},
        {name:"Mustard Oil 1L",price:170}, {name:"Ghee 1L",price:600},
        {name:"Tea 250g",price:140}, {name:"Maggi Noodles",price:14},
        {name:"Soap (Bath)",price:35}, {name:"Toothpaste 100g",price:55},
        {name:"Biscuits",price:10}, {name:"Coffee 100g",price:120},
        {name:"Masoor Dal 1kg",price:110}, {name:"Chilli Sauce 200g",price:65}
    ];

    // --- DB SYNC (FETCH HISTORY) ---
    async function fetchClient() {
        const phoneRaw = document.getElementById("mobile").value.replace(/\D/g, "");
        const phone = phoneRaw.length === 10 ? "91" + phoneRaw : phoneRaw;
        if (phone.length < 10) { alert("Invalid Mobile Number."); return; }

        const btn = document.getElementById("fetchBtn");
        btn.innerHTML = "Syncing..."; btn.disabled = true;

        try {
            const res = await fetch(SHEET_API, { method: 'POST', body: JSON.stringify({ action: "getClient", phone }) });
            const data = await res.json();
            const detailDiv = document.getElementById("clientDetails");
            
            if (data.found) {
                detailDiv.innerHTML = `
                <div class="client-profile">
                    <div style="background: var(--brand); color: white; padding: 10px; border-radius: 50%;">
                        <svg class="icon-svg" viewBox="0 0 24 24"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" stroke="currentColor" stroke-width="2" fill="none"/></svg>
                    </div>
                    <div>
                        <p style="margin:0; font-weight:800; color:var(--brand); font-size:15px;">Customer: ${data.name}</p>
                        <p style="margin:2px 0; font-size:12px; color:#475569;">History: ₹${data.totalBill} | Unpaid: <span style="color:red; font-weight:700;">₹${data.totalDue}</span></p>
                    </div>
                </div>`;
                document.getElementById("customer").value = data.name;
            } else {
                detailDiv.innerHTML = `<div class="client-profile" style="background:#f1f5f9; border-color:#e2e8f0;"><p style="margin:0; font-size:13px; color:#64748b;">New Record Created on Authorization.</p></div>`;
            }
        } catch (e) { console.error(e); }
        finally { btn.innerHTML = "Sync Database"; btn.disabled = false; }
    }

    // --- ITEM MANAGEMENT ---
    function addItemRow() {
        const div = document.createElement("div");
        div.className = "item-row";
        const options = services.sort((a,b) => a.name.localeCompare(b.name)).map((s) => {
            const idx = services.findIndex(x => x.name === s.name);
            return `<option value="${idx}">${s.name} - ₹${s.price}</option>`;
        }).join("");

        div.innerHTML = `
            <select class="sel-item" onchange="updateCalculations(true)">${options}</select>
            <input type="number" class="sel-qty" value="1" min="0.1" step="0.1" oninput="updateCalculations(true)">
            <div class="remove-row-btn" onclick="this.parentElement.remove(); updateCalculations(true);">
                <svg class="icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
            </div>
        `;
        document.getElementById("itemsContainer").appendChild(div);
        updateCalculations(true);
    }

    function updateCalculations(resetPaid = false) {
        let sub = 0;
        document.querySelectorAll(".item-row").forEach(row => {
            const idx = row.querySelector(".sel-item").value;
            const qty = parseFloat(row.querySelector(".sel-qty").value) || 0;
            sub += services[idx].price * qty;
        });
        const disc = parseFloat(document.getElementById("discount").value) || 0;
        const net = Math.max(0, sub - disc);
        
        document.getElementById("grandTotalText").innerText = `₹${net.toFixed(2)}`;
        
        // Only reset paidAmount to full if explicitly asked (e.g., when items change)
        if (resetPaid) {
            document.getElementById("paidAmount").value = net.toFixed(2);
        }
        
        return { sub, disc, net };
    }

    // --- QUICK QR FEATURE ---
    function generateQuickQR(type) {
        const { net } = updateCalculations(false);
        let amt = 0;
        
        if (type === 'full') {
            amt = net;
        } else {
            amt = parseFloat(document.getElementById("quickPayAmount").value) || 0;
        }
        
        if (amt <= 0) { alert("Enter valid amount"); return; }
        if (amt > net) { alert("Amount exceeds total bill"); return; }

        // UPDATE THE PAID AMOUNT IN MAIN FORM
        document.getElementById("paidAmount").value = amt.toFixed(2);
        
        const upi = `upi://pay?pa=${UPI_ID}&pn=GuptaKirana&am=${amt.toFixed(2)}&cu=INR`;
        const container = document.getElementById("quickQRContainer");
        container.innerHTML = `<p style="font-weight:700; margin-bottom:10px;">Pay Part: ₹${amt.toFixed(2)}</p><div id="qQR"></div>`;
        new QRCode(document.getElementById("qQR"), { text: upi, width: 140, height: 140 });
        
        if (navigator.vibrate) navigator.vibrate(100);
    }

    // --- FINAL INVOICE (PRO UI) ---
    async function generateInvoice() {
        const { sub, disc, net } = updateCalculations(false);
        const paid = parseFloat(document.getElementById("paidAmount").value) || 0;
        const bal = net - paid;
        const status = bal <= 0 ? "PAID" : (paid > 0 ? "PARTIAL" : "DUE");
        const invNo = "GKS-" + Date.now().toString().slice(-6);

        let rowsHtml = "";
        document.querySelectorAll(".item-row").forEach(row => {
            const item = services[row.querySelector(".sel-item").value];
            const qty = row.querySelector(".sel-qty").value;
            rowsHtml += `<tr><td>${item.name}</td><td>${qty}</td><td>₹${item.price}</td><td>₹${(item.price * qty).toFixed(2)}</td></tr>`;
        });

        const area = document.getElementById("invoiceArea");
        area.style.display = "block";
        area.innerHTML = `
            <div id="captureNode" class="invoice-card">
                <div class="badge" style="background:${status==='PAID'?'#10b981':status==='PARTIAL'?'#f59e0b':'#f43f5e'}">${status}</div>
                <div class="invoice-header">
                    <h2>GUPTA KIRANA STORE</h2>
                    <p style="font-size:11px; color:#64748b; margin-top:5px;">Digital Billing Ecosystem | Jamalpur, Bihar</p>
                </div>
                <hr style="border:0; border-top:1px solid #f1f5f9; margin:20px 0;">
                <div style="display:flex; justify-content:space-between; font-size:12px; margin-bottom:20px;">
                    <div><strong>Bill To:</strong> ${document.getElementById("customer").value}<br><strong>Ph:</strong> ${document.getElementById("mobile").value}</div>
                    <div style="text-align:right;"><strong>Invoice:</strong> ${invNo}<br><strong>Date:</strong> ${new Date().toLocaleDateString()}</div>
                </div>
                <table class="invoice-table"><thead><tr><th>Description</th><th>Qty</th><th>Rate</th><th>Total</th></tr></thead><tbody>${rowsHtml}</tbody></table>
                <div class="summary-box">
                    <div class="summary-row"><span>Subtotal:</span><span>₹${sub.toFixed(2)}</span></div>
                    <div class="summary-row"><span>Discount:</span><span>-₹${disc.toFixed(2)}</span></div>
                    <div class="grand-total"><div class="summary-row"><strong>Grand Total:</strong><strong>₹${net.toFixed(2)}</strong></div></div>
                    <div class="summary-row" style="margin-top:5px;"><span>Paid (${document.getElementById("paymentMode").value}):</span><span>₹${paid.toFixed(2)}</span></div>
                    <div class="summary-row" style="color:red; font-weight:800;"><span>Remaining Balance:</span><span>₹${bal.toFixed(2)}</span></div>
                </div>
                ${bal > 0 ? `<div class="qr-area"><p style="font-size:11px; margin-bottom:10px;">Scan to settle remaining ₹${bal.toFixed(2)}</p><div id="fQR"></div></div>` : ""}
            </div>`;

        document.getElementById("afterButtons").style.display = "grid";
        if (bal > 0) new QRCode(document.getElementById("fQR"), { text: `upi://pay?pa=${UPI_ID}&pn=GuptaKirana&am=${bal.toFixed(2)}&cu=INR`, width: 120, height: 120 });
        
        area.scrollIntoView({ behavior: 'smooth' });

        // Post to Sheet
        try {
            fetch(SHEET_API, { method: 'POST', body: JSON.stringify({ action: "addBill", phone: document.getElementById("mobile").value.replace(/\D/g,""), name: document.getElementById("customer").value, amount: net }) });
        } catch(e) {}
    }

    // --- WHATSAPP DETAILED MESSAGE ---
    function shareWhatsApp() {
        const name = document.getElementById("customer").value || "Customer";
        const mobile = document.getElementById("mobile").value.replace(/\D/g,"");
        const { sub, disc, net } = updateCalculations(false);
        const paid = parseFloat(document.getElementById("paidAmount").value) || 0;
        const bal = net - paid;

        let itemsText = "";
        document.querySelectorAll(".item-row").forEach(row => {
            const item = services[row.querySelector(".sel-item").value];
            const qty = row.querySelector(".sel-qty").value;
            itemsText += `• ${item.name} (x${qty}) - ₹${(item.price * qty).toFixed(2)}\n`;
        });

        const upiLink = `upi://pay?pa=${UPI_ID}&pn=GuptaKirana&am=${bal.toFixed(2)}&cu=INR`;

        const message = `*GUPTA KIRANA STORE - DIGITAL BILL*\n\n` +
            `Namaste *${name}*,\n` +
            `Purchase summary:\n\n` +
            `${itemsText}\n` +
            `---------------------------\n` +
            `Subtotal: ₹${sub.toFixed(2)}\n` +
            `Discount: -₹${disc.toFixed(2)}\n` +
            `*Grand Total: ₹${net.toFixed(2)}*\n` +
            `Paid: ₹${paid.toFixed(2)}\n` +
            `*Balance Due: ₹${bal.toFixed(2)}*\n\n` +
            (bal > 0 ? `👉 *Tap to Pay Balance (₹${bal.toFixed(2)}):*\n${upiLink}` : `✅ *Payment Full. Thank you!*`);

        window.open(`https://wa.me/${mobile}?text=${encodeURIComponent(message)}`);
    }

    function downloadInvoice() {
        const target = document.getElementById("captureNode");
        window.scrollTo(0,0);
        html2canvas(target, { scale: 3, backgroundColor: "#ffffff", width: 750 }).then(canvas => {
            const a = document.createElement("a");
            a.download = `Bill_${Date.now()}.png`;
            a.href = canvas.toDataURL("image/png");
            a.click();
        });
    }

    addItemRow();
</script>

</body>
</html>
