<style>
/* ===== Global Styles ===== */
body{
  font-family:'Segoe UI',sans-serif;
  margin:0;
  padding:20px;
  background:linear-gradient(135deg,#fdfbfb,#ebedee);
  color:#111;
}

.container{
  max-width:900px;
  margin:auto;
  background:white;
  padding:30px;
  border-radius:25px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

/* Branding */
.brand{text-align:center;margin-bottom:25px;}
.brand h1{
  margin:0;
  font-size:30px;
  color:#4f46e5;
}
.brand p{color:#555;font-size:15px;}

/* Inputs & Selects */
input, select{
  padding:14px;
  border-radius:12px;
  border:1px solid #ddd;
  font-size:18px;
  margin-bottom:14px;
  background:#f9fafb;
  color:#111;
  width:100%;
}

/* Buttons */
button{
  padding:16px;
  border:none;
  border-radius:14px;
  cursor:pointer;
  font-weight:bold;
  font-size:18px;
  margin-top:12px;
  transition:0.2s;
  width:100%;
}

.primary{
  background:linear-gradient(45deg,#6366f1,#4f46e5);
  color:white;
}

.secondary{
  background:linear-gradient(45deg,#25D366,#128C7E);
  color:white;
}

.download{
  background:linear-gradient(45deg,#0ea5e9,#2563eb);
  color:white;
}

.thermal{
  background:linear-gradient(45deg,#f43f5e,#ec4899);
  color:white;
}

.advanceBtn{
  background:linear-gradient(45deg,#14b8a6,#0d9488);
  color:white;
}

button:hover{
  transform:scale(1.02);
}

/* Item Rows */
.itemRow{
  display:flex;
  flex-direction:column;
  gap:12px;
  margin-top:15px;
}
.itemRow select,
.itemRow input{
  width:100%;
}

.removeBtn{
  background:#ef4444;
  color:white;
  border:none;
  border-radius:50%;
  width:45px;
  height:45px;
  font-size:22px;
  align-self:flex-end;
}

/* Total Preview */
#totalPreview{
  font-weight:bold;
  margin:18px 0;
  font-size:22px;
  color:#4f46e5;
}

/* Client Popup */
.clientPopup{
  background:#f3f4f6;
  padding:15px;
  border-radius:12px;
  margin-bottom:15px;
  font-size:16px;
}
.clientPopup p{
  margin:4px 0;
}

/* Responsive */
@media(min-width:600px){
  .itemRow{
    flex-direction:row;
    align-items:center;
  }
  .itemRow select{flex:2;}
  .itemRow input{flex:1;}
}

/* ===== Premium Invoice Section ===== */
.invoice{
  background:#ffffff;
  color:#111827;
  padding:35px;
  border-radius:24px;
  margin-top:35px;
  box-shadow:0 15px 40px rgba(0,0,0,0.08);
  position:relative;
  border:1px solid #eef2ff;
}

/* Header Styling */
.invoice h2{
  margin:0;
  font-size:28px;
  color:#4f46e5;
  letter-spacing:1px;
  text-align:center;
  font-weight:700;
}

.invoice hr{
  border:none;
  height:1px;
  background:linear-gradient(to right,#4f46e5,#a5b4fc);
  margin:22px 0;
}

/* Status Badge Improved */
.statusBadge{
  position:absolute;
  top:25px;
  right:25px;
  padding:10px 22px;
  border-radius:50px;
  font-weight:700;
  font-size:15px;
  letter-spacing:1px;
  color:white;
  box-shadow:0 5px 15px rgba(0,0,0,0.15);
}
.paid{ background:#16a34a; }
.due{ background:#dc2626; }
.partial{ background:#f59e0b; }

/* Table Design */
.invoice table{
  width:100%;
  border-collapse:separate;
  border-spacing:0;
  margin-top:30px;
  border-radius:14px;
  overflow:hidden;
}

.invoice th{
  background:#4f46e5;
  color:white;
  font-weight:600;
  padding:16px;
  font-size:18px;
}

.invoice td{
  padding:16px;
  background:#f9fafb;
  border-bottom:1px solid #e5e7eb;
  font-size:17px;
}

.invoice tr:last-child td{
  border-bottom:none;
}

.invoice tr:nth-child(even) td{
  background:#eef2ff;
}

/* Total Section Card Style */
.totalBox{
  margin-top:35px;
  padding:25px;
  background:#f9fafb;
  border-radius:16px;
  text-align:right;
  font-size:18px;
  line-height:2;
}

/* Highlight amounts */
.totalBox strong{
  font-size:22px;
  color:#4f46e5;
}
.paidAmount{color:#16a34a;font-weight:600;}
.balanceAmount{color:#dc2626;font-weight:700;font-size:20px;}
</style>

// === JS Functions ===
// Same as user provided code: addRow(), removeRow(), updateTotal(), fetchClient(), generateAdvanceQR(), shareAdvanceWhatsApp(), createBill(), downloadBill(), shareWhatsApp()

// [All JS functions unchanged to ensure full functionality]
// --- ADD SERVICE ROW WITH REMOVE BUTTON ---
function addRow(){
  let div=document.createElement("div");
  div.className="itemRow";

  let options="";
  services.forEach((service,index)=>{
    options+=`<option value="${index}">${service.name} - ₹${service.price}</option>`;
  });

  div.innerHTML=`
    <select class="serviceSelect">${options}</select>
    <input type="number" class="qty" value="1" min="1">
    <button class="removeBtn" onclick="removeRow(this)">×</button>
  `;
  document.getElementById("items").appendChild(div);
  updateTotal();
}

// --- REMOVE SERVICE ROW ---
function removeRow(btn){
  btn.parentElement.remove();
  updateTotal();
}

// --- UPDATE TOTAL ---
  function updateTotal(){
  let subtotal = 0;

  document.querySelectorAll(".itemRow").forEach(row=>{
    let idx = row.querySelector(".serviceSelect").value;
    let qty = parseFloat(row.querySelector(".qty").value) || 1;
    subtotal += services[idx].price * qty;
  });

  let discount = parseFloat(document.getElementById("discount").value) || 0;
  let total = subtotal - discount;

  if(total < 0) total = 0; // safety

  document.getElementById("totalPreview").innerText =
    "Total: ₹" + total.toFixed(2);

  // 🔥 Paid Amount auto fill
  document.getElementById("paidAmount").value =
    total.toFixed(2);
  }
});

addRow(); // initial row

// --- FETCH CLIENT DETAILS ---
async function fetchClient(){
  let phone=document.getElementById("mobile").value.replace(/\D/g,"");
  if(phone.length===10) phone="91"+phone;
  
  try{
    const res=await fetch(SHEET_API,{
      method:'POST',
      body:JSON.stringify({action:"getClient",phone})
    });
    const data=await res.json();

    let popup=document.getElementById("clientDetails");
    popup.innerHTML="";
    if(data.found){
      popup.innerHTML=`
      <div class="clientPopup">
        <p><strong>Name:</strong> ${data.name}</p>
        <p><strong>Total Bill:</strong> ₹${data.totalBill}</p>
        <p><strong>Total Paid:</strong> ₹${data.totalPaid}</p>
        <p><strong>Total Due:</strong> ₹${data.totalDue}</p>
        <p><strong>Last Updated:</strong> ${data.lastUpdated||"N/A"}</p>
      </div>`;
      document.getElementById("customer").value=data.name;
    }else{
      popup.innerHTML=`<p>Client not found, you can add new.</p>`;
    }
  }catch(err){
    console.error(err);
    alert("Error fetching client from Sheet.");
  }
}

// --- ADVANCE / FULL PAYMENT QR ---
function generateAdvanceQR(type){
  let customer = document.getElementById("customer").value || "N/A";
  let rows = document.querySelectorAll(".itemRow");
  let subtotal = 0;
  rows.forEach(row=>{
    let serviceIndex = row.querySelector(".serviceSelect").value;
    let service = services[serviceIndex];
    let qty = parseFloat(row.querySelector(".qty").value)||1;
    subtotal += service.price * qty;
  });

  let discount = parseFloat(document.getElementById("discount").value)||0;
  let payable = subtotal - discount; // discount include kar diya

  let amount=0, title="";
  if(type==="full"){ 
      amount = payable; // ab full payment QR discount ke saath
      title = "FULL PAYMENT REQUEST"; 
  } else { 
      amount = parseFloat(document.getElementById("advanceAmount").value)||0; 
      if(amount <= 0){ alert("Enter Advance"); return; } 
      title = "ADVANCE PAYMENT REQUEST"; 
  }

  // Paid Amount box auto fill ho jaaye

  advanceUpiLink = `upi://pay?pa=${UPI_ID}&pn=Algum%20Creations&am=${amount.toFixed(2)}&cu=INR`;

  let date = new Date().toLocaleDateString();
  document.getElementById("advancePreview").innerHTML = `
  <div class="invoice">
    <h3 style="text-align:center;">${title}</h3>
    <hr>
    <p><strong>Customer:</strong> ${customer}</p>
    <p><strong>Amount:</strong> ₹${amount.toFixed(2)}</p>
    <p><strong>Date:</strong> ${date}</p>
    <div id="advanceQR" style="margin-top:15px;"></div>
    <br>
    <button class="secondary" onclick="shareAdvanceWhatsApp('${amount.toFixed(2)}','${title}')">Share WhatsApp</button>
  </div>`;
  
  new QRCode(document.getElementById("advanceQR"), advanceUpiLink);
  if(navigator.vibrate){ navigator.vibrate(200); }
}
function shareAdvanceWhatsApp(amount,title){
  let mobile=document.getElementById("mobile").value.replace(/\D/g,"");
  if(mobile.length===10) mobile="91"+mobile;
  let message=`*GUPTA KIRANA STORE*\n${title}\nClient: ${document.getElementById("customer").value}\nAmount: ₹${amount}\nPayment Link: ${advanceUpiLink}`;
  window.open(`https://wa.me/${mobile}?text=${encodeURIComponent(message)}`,"_blank");
}

// --- CREATE BILL AND POST TO SHEET ---
async function createBill(){
  let customer=document.getElementById("customer").value || "N/A";
  let mobile=document.getElementById("mobile").value.replace(/\D/g,"")||"N/A";
  if(mobile.length===10) mobile="91"+mobile;

  let paymentMode=document.getElementById("paymentMode").value;
  let paid=parseFloat(document.getElementById("paidAmount").value)||0;
  let discount=parseFloat(document.getElementById("discount").value)||0;

  let rows=document.querySelectorAll(".itemRow");
  let subtotal=0;
  let tableHTML="<table><tr><th>Service</th><th>Qty</th><th>Price</th><th>Total</th></tr>";
  rows.forEach(row=>{
    let serviceIndex=row.querySelector(".serviceSelect").value;
    let service=services[serviceIndex];
    let qty=parseFloat(row.querySelector(".qty").value)||1;
    let amount=service.price*qty;
    subtotal+=amount;
    tableHTML+=`<tr><td>${service.name}</td><td>${qty}</td><td>₹${service.price}</td><td>₹${amount}</td></tr>`;
  });
  tableHTML+="</table>";

  let total=subtotal-discount;
  let balance=total-paid;
  let status=balance<=0?"PAID":paid>0?"PARTIAL":"DUE";

  let date=new Date().toLocaleDateString();
  let invoiceNo="AC-"+Date.now().toString().slice(-6);

  // --- BUILD BILL HTML ---
  let billHTML=`
  <div id="finalBill" class="invoice">
    <div class="statusBadge ${status==="PAID"?"paid":status==="PARTIAL"?"partial":"due"}">${status}</div>
    <h2 style="text-align:center;">ALGUM CREATIONS</h2>
    <p style="text-align:center;">One Stop Solution For Digital Business</p>
    <hr>
    <p><strong>Invoice No:</strong> ${invoiceNo}</p>
    <p><strong>Date:</strong> ${date}</p>
    <p><strong>Client:</strong> ${customer}</p>
    <p><strong>Mobile:</strong> ${mobile}</p>
    <p><strong>Payment Mode:</strong> ${paymentMode}</p>
    ${tableHTML}
    <div class="totalBox">
      Subtotal: ₹${subtotal.toFixed(2)}<br>
      Discount: ₹${discount.toFixed(2)}<br>
      Grand Total: ₹${total.toFixed(2)}<br>
      Paid: ₹${paid.toFixed(2)}<br>
      Balance: ₹${balance.toFixed(2)}
    </div>
    ${balance>0?`<div style="margin-top:20px;text-align:center;"><h3>Scan to Pay ₹${balance.toFixed(2)}</h3><div id="billQR"></div></div>`:""}
  </div>`;
  document.getElementById("billPreview").innerHTML=billHTML;
  document.getElementById("afterButtons").style.display="block";

  if(balance>0){
    billUpiLink=`upi://pay?pa=${UPI_ID}&pn=Algum%20Creations&am=${balance.toFixed(2)}&cu=INR`;
    new QRCode(document.getElementById("billQR"), billUpiLink);
  }

  window.billData={customer,mobile,total,status};
  if(navigator.vibrate){ navigator.vibrate(200); }

  // --- POST TO GOOGLE SHEET ---
  try{
    const res=await fetch(SHEET_API,{
      method:'POST',
      body:JSON.stringify({action:"addBill",phone:mobile,name:customer,amount:total})
    });
    const data=await res.json();
    if(data.success) console.log("Bill added ✅");
    else console.warn("Failed to add bill");
    if(paid>0){
      const payRes=await fetch(SHEET_API,{
        method:'POST',
        body:JSON.stringify({action:"addPayment",phone:mobile,amount:paid,mode:paymentMode})
      });
      const payData=await payRes.json();
      if(payData.success) console.log("Payment added ✅");
    }
  }catch(err){ console.error("Sheet update error:",err);}
}

function downloadBill(){
  html2canvas(document.getElementById("finalBill")).then(canvas=>{
    let link=document.createElement("a");
    link.download="Algum_Creations_Invoice.png";
    link.href=canvas.toDataURL();
    link.click();
  });
}

function shareWhatsApp(){
  let data=window.billData;
  if(!data){ alert("Generate Invoice First"); return; }
  let mobile=data.mobile.replace(/\D/g,"");
  if(mobile.length===10) mobile="91"+mobile;
  let message=`*ALGUM CREATIONS*\nInvoice Status: ${data.status}\nTotal: ₹${data.total}\n${data.status!=="PAID"?"Payment Link:\n"+billUpiLink+"\n":""}`;
  window.open(`https://wa.me/${mobile}?text=${encodeURIComponent(message)}`,"_blank");
}
 document.getElementById("discount").addEventListener("input", updateTotal);
});
